name: Source 제출
description: 조사에 사용할 URL 또는 파일을 제출합니다.
title: "[Source] "
labels:
  - "source:new"
body:
  - type: markdown
    attributes:
      value: |
        정형 보고서를 작성할 필요가 없습니다. URL 또는 파일과 간단한 의견만 제출하면 Intake Agent가 정규화합니다.
  - type: input
    id: source_url
    attributes:
      label: Source URL
      description: 공개 URL이 있으면 입력합니다. 파일만 제출하는 경우 비워도 됩니다.
      placeholder: https://example.com/report
  - type: textarea
    id: attachment
    attributes:
      label: 파일 또는 첨부
      description: 파일을 이 영역에 끌어 놓거나 저장소 내 경로를 입력합니다.
      placeholder: 파일 첨부 또는 경로
  - type: textarea
    id: note
    attributes:
      label: 한 줄 의견
      description: 이 자료가 중요한 이유를 자유롭게 적습니다.
      placeholder: 이 자료는 경쟁사의 이벤트 스키마와 가격 정책을 비교하는 데 유용합니다.
  - type: textarea
    id: question
    attributes:
      label: 관련 조사 질문
      description: 이 자료가 답한다고 생각하는 질문이 있으면 적습니다.
      placeholder: 세션 리플레이 도구는 어떤 이벤트를 기본 수집하는가?
  - type: dropdown
    id: source_type
    attributes:
      label: 자료 유형
      options:
        - 공식 문서 또는 제품 페이지
        - 논문 또는 연구 보고서
        - 시장 또는 산업 보고서
        - 고객 인터뷰 또는 회의 기록
        - 데이터셋
        - 기사 또는 블로그
        - 기타
    validations:
      required: true
  - type: checkboxes
    id: rights
    attributes:
      label: 확인
      options:
        - label: 팀 내부 조사 목적으로 이 자료를 제출할 수 있습니다.
          required: true
        - label: 유료 또는 비공개 자료라면 접근 제한을 한 줄 의견에 표시했습니다.
          required: false
