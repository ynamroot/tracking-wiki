name: Validate And Publish Wiki

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate structure and references
        shell: pwsh
        run: ./scripts/Validate-Wiki.ps1

  build-site:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Quartz engine
        uses: actions/cache@v5
        with:
          path: .cache/quartz
          key: quartz-${{ runner.os }}-${{ hashFiles('site/quartz-version.txt', 'site/quartz.config.yaml') }}

      - name: Build public Wiki
        shell: pwsh
        run: ./scripts/Build-WikiSite.ps1

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site-output

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
