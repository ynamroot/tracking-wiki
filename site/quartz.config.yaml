configuration:
  pageTitle: Tracking Wiki
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: ko-KR
  baseUrl: ynamroot.github.io/tracking-wiki
  ignorePatterns:
    - AGENTS.md
    - README.md
    - audits/**
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Schibsted Grotesk
      body: Source Sans Pro
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#fafafa"
        lightgray: "#e5e7eb"
        gray: "#9ca3af"
        darkgray: "#374151"
        dark: "#111827"
        secondary: "#0f766e"
        tertiary: "#2563eb"
        highlight: rgba(15, 118, 110, 0.12)
        textHighlight: "#fef08a88"
      darkMode:
        light: "#18181b"
        lightgray: "#3f3f46"
        gray: "#71717a"
        darkgray: "#d4d4d8"
        dark: "#f4f4f5"
        secondary: "#5eead4"
        tertiary: "#60a5fa"
        highlight: rgba(94, 234, 212, 0.12)
        textHighlight: "#854d0e88"
plugins:
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties: []
      excludedProperties: []
      hidePropertiesView: true
      delimiters: ---
      language: yaml
    order: 5
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: false
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      title: 읽기 순서
      folderDefaultState: open
      useSavedState: false
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: https://github.com/ynamroot/tracking-wiki
        자료 제보: https://github.com/ynamroot/tracking-wiki/issues/new?template=source-submission.yml
        조사 질문: https://github.com/ynamroot/tracking-wiki/issues/new?template=research-question.yml
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
